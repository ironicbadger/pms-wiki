# Markdownlint configuration for PMS Wiki
# https://github.com/DavidAnson/markdownlint/blob/main/doc/Rules.md

# Default state for all rules
default: true

# Line length - disabled for MkDocs prose where soft wrapping is preferred.
MD013: false

# Dollar signs used before commands without showing output
MD014: false

# Duplicate heading - disabled for docs that may repeat headings
MD024: false

# Multiple headings with the same content - disabled for consistency
MD025: false

# Trailing punctuation in heading - disabled for conversational docs headings.
MD026: false

# Unordered list style - disabled because files mix markers intentionally.
MD004: false

# Unordered list indentation - disabled for MkDocs card and nested list syntax.
MD007: false

# Headings should be surrounded by blank lines - disabled for MkDocs pages/front matter.
MD022: false

# Spaces after list markers - disabled for MkDocs Material card lists.
MD030: false

# Fenced code blocks should be surrounded by blank lines - disabled for MkDocs blocks.
MD031: false

# Lists should be surrounded by blank lines
MD032: true

# Inline HTML - disabled as MkDocs Material uses HTML and embeds extensively.
MD033: false

# No bare URLs - disabled as some docs use them intentionally
MD034: false

# Horizontal rules style
MD035:
  style: "---"

# Require code fence language - disabled as not always needed
MD040: false

# First line in file should be a top-level heading - disabled for included files
MD041: false

# Images should have alternate text - disabled because MkDocs image attributes confuse markdownlint.
MD045: false

# Code block style - disabled because MkDocs tabs/admonitions require indented content.
MD046: false

# Spaces inside code spans - disabled because indented MkDocs fences can be misread.
MD038: false

# Emphasis style
MD049:
  style: underscore

# Strong style
MD050:
  style: asterisk

# Reference definitions should be needed - disabled because footnotes can be generated/consumed by MkDocs.
MD053: false

# Link and image style
MD054:
  link_image_style: collapsed
  link_image_collapse_single_space: true

# Table pipe style
MD055:
  style: leading_and_trailing

# Table row style
MD056: true

# Table column alignment - disabled because prose tables are not kept visually aligned.
MD060: false
