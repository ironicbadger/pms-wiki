server {
    listen       80;
    listen  [::]:80;
    server_name  localhost;

    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
    }

    location /scripts/ {
        root   /usr/share/nginx/html;
        types {
            text/plain sh;
        }
        default_type text/plain;
        add_header X-Content-Type-Options nosniff;
    }

    error_page  404              /404.html;
    location = /404.html {
        root /usr/share/nginx/html;
        internal;
    }

}
